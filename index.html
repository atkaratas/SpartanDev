<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spartans Dev | AI Council Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --pure-black: #020202;
            --maroon: #800000;
            --royal-purple: #6A0DAD;
            --imperial-gold: #C5A022;
            --neon-blue: #00f3ff;
            --glass-bg: rgba(10, 10, 10, 0.95);
        }
        body {
            background-color: var(--pure-black);
            background-image: radial-gradient(circle at 20% 30%, rgba(128, 0, 0, 0.1) 0%, transparent 40%),
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: #E0E0E0;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px;
        }
        h1, h2, .bot-name { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 4px; }
        
        .header { text-align: center; margin-bottom: 50px; border-bottom: 1px solid var(--maroon); padding-bottom: 20px; }
        .header h1 { font-size: 3rem; color: var(--maroon); text-shadow: 0 0 20px rgba(128, 0, 0, 0.5); margin: 0; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto 50px auto;
        }

        .bot-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .bot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bot-name { font-size: 1.5rem; color: var(--imperial-gold); }
        .status-dot { height: 10px; width: 10px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; }

        /* BOT SPECIFIC TASK LIST */
        .bot-tasks { list-style: none; padding: 0; margin-bottom: 20px; }
        .bot-task-item { font-size: 0.75rem; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; gap: 10px; }
        .bot-task-item.done { text-decoration: line-through; opacity: 0.4; color: #2ecc71; }
        .task-bullet { width: 6px; height: 6px; border: 1px solid var(--neon-blue); border-radius: 50%; }

        /* PROGRESS BAR */
        .progress-container { width: 100%; background: #111; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: var(--neon-blue); width: 0%; transition: width 0.5s ease-in-out; box-shadow: 0 0 10px var(--neon-blue); }

        .command-log-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #050505;
            border: 1px solid var(--maroon);
            border-radius: 4px;
            overflow: hidden;
        }
        .log-header {
            background: var(--maroon);
            color: #FFF;
            padding: 8px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }
        .log-body {
            height: 400px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--neon-blue);
            overflow-y: auto;
        }
        .log-line { margin-bottom: 4px; border-bottom: 1px solid rgba(0, 243, 255, 0.02); }
    </style>
</head>
<body>
    <div class="header">
        <h1>SPARTANS COUNCIL</h1>
    </div>

    <div class="dashboard-grid" id="botGrid">
        <!-- ARES -->
        <div class="bot-card">
            <div class="bot-header"><div class="bot-name">ARES</div><div class="status-dot"></div></div>
            <ul class="bot-tasks" id="tasks-ares"></ul>
            <div class="progress-container"><div class="progress-bar" id="progress-ares"></div></div>
        </div>
        <!-- MIDAS -->
        <div class="bot-card">
            <div class="bot-header"><div class="bot-name">MIDAS</div><div class="status-dot"></div></div>
            <ul class="bot-tasks" id="tasks-midas"></ul>
            <div class="progress-container"><div class="progress-bar" id="progress-midas"></div></div>
        </div>
        <!-- ATHENA -->
        <div class="bot-card">
            <div class="bot-header"><div class="bot-name">ATHENA</div><div class="status-dot"></div></div>
            <ul class="bot-tasks" id="tasks-athena"></ul>
            <div class="progress-container"><div class="progress-bar" id="progress-athena"></div></div>
        </div>
        <!-- HEPHAESTUS -->
        <div class="bot-card">
            <div class="bot-header"><div class="bot-name">HEPHAESTUS</div><div class="status-dot"></div></div>
            <ul class="bot-tasks" id="tasks-hephaestus"></ul>
            <div class="progress-container"><div class="progress-bar" id="progress-hephaestus"></div></div>
        </div>
    </div>

    <div class="command-log-container">
        <div class="log-header"><span>SYSTEM KERNEL DEBUG FEED</span><span>v3.0 :: LIVE</span></div>
        <div id="logBody" class="log-body"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://spartandev-dashboard-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // RENDER TASKS PER BOT
        db.ref('bot_tasks').on('value', (snapshot) => {
            const data = snapshot.val();
            const bots = ['ares', 'midas', 'athena', 'hephaestus'];
            
            bots.forEach(bot => {
                const botTasks = data[bot] || [];
                const listEl = document.getElementById(`tasks-${bot}`);
                const progressEl = document.getElementById(`progress-${bot}`);
                listEl.innerHTML = '';
                
                let completedCount = 0;
                botTasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `bot-task-item ${task.done ? 'done' : ''}`;
                    li.innerHTML = `<div class="task-bullet"></div> ${task.text}`;
                    listEl.appendChild(li);
                    if(task.done) completedCount++;
                });

                const progress = (completedCount / botTasks.length) * 100 || 0;
                progressEl.style.width = `${progress}%`;
            });
        });

        // LIVE LOGS (TECHNICAL FORMAT)
        db.ref('logs').limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const logBody = document.getElementById('logBody');
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span style="color:#444">[${data.time}]</span> ${data.msg}`;
            logBody.prepend(line);
        });
    </script>
</body>
</html>
